name: Build & Deploy purview-mcp

# 參考 AuroraOps 的 ACR / ACA 自動上版模式：
# - develop push：自動建置並推送 image 到 ACR
# - main push：自動建置並推送 image 到 ACR，接著 rollout ACA
#
# 前置條件：
# 1. Service Principal 需能操作 ACR 與 ACA
# 2. 若已在 Entra App 設定 GitHub federated credential，可不設定 AZURE_DEPLOY_CLIENT_SECRET，workflow 會走 OIDC
# 3. 若尚未設定 federated credential，保留 AZURE_DEPLOY_CLIENT_SECRET，workflow 會自動改走 service principal secret login
# 4. Repository Variables 至少需設定：
#    - AZURE_SUBSCRIPTION_ID
#    - AZURE_RESOURCE_GROUP_NAME
#    - AZURE_CONTAINER_REGISTRY_NAME
# 5. Repository Secrets 至少需設定：
#    - AZURE_DEPLOY_CLIENT_ID（未設定時回退到既有 AZURE_CLIENT_ID）
#    - AZURE_DEPLOY_TENANT_ID（未設定時回退到既有 AZURE_TENANT_ID）
#    - DATABRICKS_TOKEN
#    - AZURE_DEPLOY_CLIENT_SECRET（未完成 OIDC federation 時必填；未設定時回退到既有 AZURE_CLIENT_SECRET）
# 6. ACA 的 managed identity 需已具備 ACR 的 AcrPull 權限

on:
  push:
    branches:
      - main
      - develop
    paths:
      - .github/workflows/deploy-purview-mcp-aca.yml
      - .dockerignore
      - Dockerfile
      - pyproject.toml
      - uv.lock
      - src/purview_mcp/**
  workflow_dispatch:
    inputs:
      reason:
        description: 手動觸發原因
        required: false
        default: 手動建置

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-purview-mcp-aca-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: '3.12'
  AZURE_CORE_OUTPUT: none
  DEPLOY_AZURE_CLIENT_ID: ${{ secrets.AZURE_DEPLOY_CLIENT_ID != '' && secrets.AZURE_DEPLOY_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
  DEPLOY_AZURE_TENANT_ID: ${{ secrets.AZURE_DEPLOY_TENANT_ID != '' && secrets.AZURE_DEPLOY_TENANT_ID || secrets.AZURE_TENANT_ID }}
  DEPLOY_AZURE_CLIENT_SECRET: ${{ secrets.AZURE_DEPLOY_CLIENT_SECRET != '' && secrets.AZURE_DEPLOY_CLIENT_SECRET || secrets.AZURE_CLIENT_SECRET }}
  PURVIEW_TENANT_ID_FOR_TESTS: ${{ secrets.PURVIEW_TENANT_ID != '' && secrets.PURVIEW_TENANT_ID || secrets.AZURE_TENANT_ID }}
  PURVIEW_CLIENT_ID_FOR_TESTS: ${{ secrets.PURVIEW_CLIENT_ID != '' && secrets.PURVIEW_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
  PURVIEW_CLIENT_SECRET_FOR_TESTS: ${{ secrets.PURVIEW_CLIENT_SECRET != '' && secrets.PURVIEW_CLIENT_SECRET || secrets.AZURE_CLIENT_SECRET }}
  AZURE_LOGIN_MODE: ${{ (secrets.AZURE_DEPLOY_CLIENT_SECRET != '' && 'client-secret') || (secrets.AZURE_CLIENT_SECRET != '' && 'client-secret') || 'oidc' }}
  ACR_NAME: ${{ vars.AZURE_CONTAINER_REGISTRY_NAME }}
  ACR_REGISTRY: ${{ vars.AZURE_CONTAINER_REGISTRY_ENDPOINT != '' && vars.AZURE_CONTAINER_REGISTRY_ENDPOINT || format('{0}.azurecr.io', vars.AZURE_CONTAINER_REGISTRY_NAME) }}
  ACA_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP_NAME }}
  ACA_NAME: ${{ vars.AZURE_CONTAINER_APP_NAME != '' && vars.AZURE_CONTAINER_APP_NAME || 'ms-purview-mcp-ca' }}
  ACA_CONTAINER_NAME: ${{ vars.ACA_CONTAINER_NAME != '' && vars.ACA_CONTAINER_NAME || 'main' }}
  IMAGE_NAME: purview-mcp-app

jobs:
  build-and-push:
    name: Build & Push to ACR
    runs-on: ubuntu-latest
    outputs:
      tag_latest: ${{ steps.tags.outputs.tag_latest }}
      tag_dated: ${{ steps.tags.outputs.tag_dated }}
      deploy_image: ${{ steps.tags.outputs.tag_dated }}
      short_sha: ${{ steps.tags.outputs.short_sha }}
      date_tag: ${{ steps.tags.outputs.date_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: pip install uv

      - name: Install test dependencies
        run: |
          uv export \
            --frozen \
            --group dev \
            --no-hashes \
            --no-emit-project \
            --output-file requirements-ci.txt
          python -m pip install --upgrade pip
          python -m pip install --isolated -i https://pypi.org/simple -r requirements-ci.txt
          python -m pip install --isolated -i https://pypi.org/simple --no-deps -e .

      - name: Run tests
        run: python -m pytest tests/ -m "not e2e" -v --tb=short
        env:
          PURVIEW_TENANT_ID: ${{ env.PURVIEW_TENANT_ID_FOR_TESTS }}
          PURVIEW_CLIENT_ID: ${{ env.PURVIEW_CLIENT_ID_FOR_TESTS }}
          PURVIEW_CLIENT_SECRET: ${{ env.PURVIEW_CLIENT_SECRET_FOR_TESTS }}
          PURVIEW_ACCOUNT_NAME: ${{ vars.PURVIEW_ACCOUNT_NAME }}
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

      - name: 驗證 Azure workflow 設定
        run: |
          set -euo pipefail

          if [ -z "${{ env.DEPLOY_AZURE_CLIENT_ID }}" ]; then
            echo "::error::缺少 GitHub deploy secret: AZURE_DEPLOY_CLIENT_ID（或 legacy AZURE_CLIENT_ID）"
            exit 1
          fi

          if [ -z "${{ env.DEPLOY_AZURE_TENANT_ID }}" ]; then
            echo "::error::缺少 GitHub deploy secret: AZURE_DEPLOY_TENANT_ID（或 legacy AZURE_TENANT_ID）"
            exit 1
          fi

          if [ -z "${{ vars.AZURE_SUBSCRIPTION_ID }}" ]; then
            echo "::error::缺少 GitHub variable: AZURE_SUBSCRIPTION_ID"
            exit 1
          fi

          if [ "${{ env.AZURE_LOGIN_MODE }}" = "client-secret" ] && [ -z "${{ env.DEPLOY_AZURE_CLIENT_SECRET }}" ]; then
            echo "::error::目前 workflow 會走 service principal secret login，但缺少 AZURE_DEPLOY_CLIENT_SECRET（或 legacy AZURE_CLIENT_SECRET）"
            exit 1
          fi

          if ! printf '%s' "${{ vars.AZURE_SUBSCRIPTION_ID }}" | grep -Eq '^[0-9a-fA-F-]{36}$'; then
            echo "::warning::AZURE_SUBSCRIPTION_ID 目前不是 GUID。Service principal secret login 仍會嘗試用 az account set 處理，但若要走 OIDC，建議改成 Azure Subscription GUID。"
          fi

      - name: Azure login (OIDC)
        if: ${{ env.AZURE_LOGIN_MODE == 'oidc' }}
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5
        with:
          client-id: ${{ env.DEPLOY_AZURE_CLIENT_ID }}
          tenant-id: ${{ env.DEPLOY_AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Azure login (Service Principal secret)
        if: ${{ env.AZURE_LOGIN_MODE == 'client-secret' }}
        env:
          AZURE_CLIENT_ID: ${{ env.DEPLOY_AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ env.DEPLOY_AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ env.DEPLOY_AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail
          LOGIN_ERROR_FILE="$(mktemp)"
          if ! az login \
            --service-principal \
            --username "$AZURE_CLIENT_ID" \
            --password "$AZURE_CLIENT_SECRET" \
            --tenant "$AZURE_TENANT_ID" \
            --output none 2>"$LOGIN_ERROR_FILE"; then
            cat "$LOGIN_ERROR_FILE"
            exit 1
          fi
          rm -f "$LOGIN_ERROR_FILE"

          if printf '%s' "$AZURE_SUBSCRIPTION_ID" | grep -Eq '^[0-9a-fA-F-]{36}$'; then
            TARGET_SUBSCRIPTION="$AZURE_SUBSCRIPTION_ID"
          else
            TARGET_SUBSCRIPTION="$(az account list --query "[?name=='$AZURE_SUBSCRIPTION_ID'] | [0].id" -o tsv)"
            if [ -z "$TARGET_SUBSCRIPTION" ]; then
              echo "::error::AZURE_SUBSCRIPTION_ID='$AZURE_SUBSCRIPTION_ID' 不是 GUID，且登入後找不到同名 subscription。請改填 Azure Subscription GUID。"
              az account list --query "[].{name:name,id:id}" -o table
              exit 1
            fi
            echo "Resolved subscription name '$AZURE_SUBSCRIPTION_ID' to '$TARGET_SUBSCRIPTION'"
          fi

          az account set --subscription "$TARGET_SUBSCRIPTION"
          az account show --query "{name:name,id:id}" -o table

      - name: 設定 image tags
        id: tags
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          DATE_TAG="$(date -u +%Y%m%d)"
          BRANCH="${GITHUB_REF_NAME}"

          if [ "$BRANCH" = "main" ]; then
            echo "tag_latest=${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> "$GITHUB_OUTPUT"
            echo "tag_dated=${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${DATE_TAG}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "image_tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "tag_latest=${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:develop" >> "$GITHUB_OUTPUT"
            echo "tag_dated=${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:develop-${DATE_TAG}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "image_tag=develop" >> "$GITHUB_OUTPUT"
          fi

          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "date_tag=${DATE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build & Push to ACR
        run: |
          az acr build \
            --registry "${{ env.ACR_NAME }}" \
            --image "${{ steps.tags.outputs.tag_latest }}" \
            --image "${{ steps.tags.outputs.tag_dated }}" \
            --file Dockerfile \
            .

      - name: 建置摘要
        run: |
          echo "## Build 完成" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| 欄位 | 值 |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-----|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 分支 | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ steps.tags.outputs.short_sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 日期 | \`${{ steps.tags.outputs.date_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image (穩定 tag) | \`${{ steps.tags.outputs.tag_latest }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image (時間 tag) | \`${{ steps.tags.outputs.tag_dated }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "> **ACA 更新**：此 workflow 會自動 rollout 到 \`${{ env.ACA_NAME }}\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "> **ACA 更新**：develop 只建 image，不自動 rollout ACA" >> "$GITHUB_STEP_SUMMARY"
          fi

  deploy-aca:
    name: Rollout ACA
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Azure login (OIDC)
        if: ${{ env.AZURE_LOGIN_MODE == 'oidc' }}
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5
        with:
          client-id: ${{ env.DEPLOY_AZURE_CLIENT_ID }}
          tenant-id: ${{ env.DEPLOY_AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Azure login (Service Principal secret)
        if: ${{ env.AZURE_LOGIN_MODE == 'client-secret' }}
        env:
          AZURE_CLIENT_ID: ${{ env.DEPLOY_AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ env.DEPLOY_AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ env.DEPLOY_AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail
          LOGIN_ERROR_FILE="$(mktemp)"
          if ! az login \
            --service-principal \
            --username "$AZURE_CLIENT_ID" \
            --password "$AZURE_CLIENT_SECRET" \
            --tenant "$AZURE_TENANT_ID" \
            --output none 2>"$LOGIN_ERROR_FILE"; then
            cat "$LOGIN_ERROR_FILE"
            exit 1
          fi
          rm -f "$LOGIN_ERROR_FILE"

          if printf '%s' "$AZURE_SUBSCRIPTION_ID" | grep -Eq '^[0-9a-fA-F-]{36}$'; then
            TARGET_SUBSCRIPTION="$AZURE_SUBSCRIPTION_ID"
          else
            TARGET_SUBSCRIPTION="$(az account list --query "[?name=='$AZURE_SUBSCRIPTION_ID'] | [0].id" -o tsv)"
            if [ -z "$TARGET_SUBSCRIPTION" ]; then
              echo "::error::AZURE_SUBSCRIPTION_ID='$AZURE_SUBSCRIPTION_ID' 不是 GUID，且登入後找不到同名 subscription。請改填 Azure Subscription GUID。"
              az account list --query "[].{name:name,id:id}" -o table
              exit 1
            fi
            echo "Resolved subscription name '$AZURE_SUBSCRIPTION_ID' to '$TARGET_SUBSCRIPTION'"
          fi

          az account set --subscription "$TARGET_SUBSCRIPTION"
          az account show --query "{name:name,id:id}" -o table

      - name: 更新 ACA image
        id: rollout
        env:
          DEPLOY_IMAGE: ${{ needs.build-and-push.outputs.deploy_image }}
        run: |
          az containerapp update \
            --name "${{ env.ACA_NAME }}" \
            --resource-group "${{ env.ACA_RESOURCE_GROUP }}" \
            --image "$DEPLOY_IMAGE" \
            --output none

          LATEST_REVISION=$(az containerapp show \
            --name "${{ env.ACA_NAME }}" \
            --resource-group "${{ env.ACA_RESOURCE_GROUP }}" \
            --query properties.latestRevisionName \
            -o tsv)

          echo "latest_revision=$LATEST_REVISION" >> "$GITHUB_OUTPUT"

      - name: 等待最新 revision ready
        env:
          DEPLOY_IMAGE: ${{ needs.build-and-push.outputs.deploy_image }}
          LATEST_REVISION: ${{ steps.rollout.outputs.latest_revision }}
        run: |
          for attempt in $(seq 1 30); do
            READY_REVISION=$(az containerapp show \
              --name "${{ env.ACA_NAME }}" \
              --resource-group "${{ env.ACA_RESOURCE_GROUP }}" \
              --query properties.latestReadyRevisionName \
              -o tsv)

            CURRENT_IMAGE=$(az containerapp show \
              --name "${{ env.ACA_NAME }}" \
              --resource-group "${{ env.ACA_RESOURCE_GROUP }}" \
              --query "properties.template.containers[?name=='${{ env.ACA_CONTAINER_NAME }}'].image | [0]" \
              -o tsv)

            echo "attempt=$attempt latest=$LATEST_REVISION ready=$READY_REVISION image=$CURRENT_IMAGE"

            if [ -n "$LATEST_REVISION" ] && [ "$LATEST_REVISION" = "$READY_REVISION" ] && [ "$CURRENT_IMAGE" = "$DEPLOY_IMAGE" ]; then
              exit 0
            fi

            sleep 10
          done

          echo "::error::ACA rollout timeout: latest revision 未進入 ready 狀態"
          az containerapp show \
            --name "${{ env.ACA_NAME }}" \
            --resource-group "${{ env.ACA_RESOURCE_GROUP }}" \
            --query "{latestRevision:properties.latestRevisionName,latestReadyRevision:properties.latestReadyRevisionName,image:properties.template.containers[?name=='${{ env.ACA_CONTAINER_NAME }}'].image | [0]}" \
            -o json
          exit 1

      - name: 部署摘要
        run: |
          echo "## ACA Rollout 完成" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| 欄位 | 值 |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-----|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Container App | \`${{ env.ACA_NAME }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Revision | \`${{ steps.rollout.outputs.latest_revision }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${{ needs.build-and-push.outputs.deploy_image }}\` |" >> "$GITHUB_STEP_SUMMARY"
